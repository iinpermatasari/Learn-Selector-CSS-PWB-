<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tugas CSS - Inline Style</title>
</head>
<body style="background-color: #f0f8ff; font-family: sans-serif; padding: 20px;"> <!-- 1. body -->

    <h1 style="color: navy; text-align: center; border-bottom: 2px solid navy;">Metode Inline Style</h1> <!-- 2. h1 -->

    <div style="background: white; border-radius: 10px; padding: 15px; box-shadow: 2px 2px 5px #ccc;"> <!-- 3. div -->
        <p style="font-size: 16px; line-height: 1.5;">Ini adalah contoh penggunaan 10 style inline berbeda.</p> <!-- 4. p -->
        
        <b style="color: rgb(15, 25, 173); text-transform: uppercase;">Teks Tebal Berwarna</b> <!-- 5. b -->
        <br><br>
        
        <button style="background: rgb(73, 73, 199); color: white; padding: 10px; border: none; cursor: pointer;">Tombol Biru</button> <!-- 6. button -->
        <hr style="border: 1px dashed rgb(48, 66, 146);"> <!-- 7. hr -->
        
        <input type="text" placeholder="Input Box" style="border: 1px solid rgb(0, 45, 128); padding: 5px;"> <!-- 8. input -->
        
        <ul style="list-style-type: circle; color: rgb(35, 181, 230);"> <!-- 9. ul -->
            <li style="margin-bottom: 5px;">Item List CSS</li> <!-- 10. li -->
        </ul>

        <a href="index.html" target="_blank" class="btn-link" style="font-size: 14px; font-style: italic; color: rgb(35, 181, 230);">Kunjungi External CSS</a>
    </div>

    

</body>
</html>
