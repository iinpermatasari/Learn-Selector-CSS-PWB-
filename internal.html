<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tugas CSS - Internal Style</title>
    <style>
        /* 1. Element Selector */
        body { background-color: #fff5ee; text-align: center; }
        /* 2. ID Selector */
        #container { width: 50%; margin: 50px auto; background: white; padding: 20px; border: 1px solid #ddd; }
        /* 3. Class Selector */
        .judul-utama { color: #4e7ab1; font-family: 'Courier New', Courier, monospace; }
        /* 4. Descendant Selector */
        nav ul { list-style: none; padding: 0; }
        /* 5. Grouping Selector */
        h2, h3 { color: #333; text-decoration: underline; }
        /* 6. Universal Selector */
        * { box-sizing: border-box; }
        /* 7. Pseudo-class :hover */
        .link-aktif:hover { color: orange; font-weight: bold; }
        /* 8. Attribute Selector */
        img[alt="logo"] { width: 100px; filter: brightness(100%); }
        /* 9. Child Selector */
        div > span { display: block; margin-top: 10px; color: gray; }
        /* 10. Pseudo-element ::first-letter */
        .teks-keren::first-letter { font-size: 30px; color: #4e7ab1; }
    </style>~
</head>

        <h1 class="judul-utama">Penggunaan CSS menggunakan Internal Style</h1>
